name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write          

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --console --name CraftHelper `
            --add-data "assets/recipes.txt;assets" `
            --add-data "assets/easy_ingredients.txt;assets" `
            --collect-all customtkinter `
            --collect-all PIL `
            --hidden-import models `
            --hidden-import calculator `
            --hidden-import dialogs `
            --hidden-import gui `
            --hidden-import database `
            --hidden-import parser `
            --hidden-import resources `
            main.py

      - name: Upload artifact to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/CraftHelper.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --console --name CraftHelper \
            --add-data "assets/recipes.txt:assets" \
            --add-data "assets/easy_ingredients.txt:assets" \
            --collect-all customtkinter \
            --collect-all PIL \
            --hidden-import models \
            --hidden-import calculator \
            --hidden-import dialogs \
            --hidden-import gui \
            --hidden-import database \
            --hidden-import parser \
            --hidden-import resources \
            main.py

      - name: Upload artifact to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/CraftHelper
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
